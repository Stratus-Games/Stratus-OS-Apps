<!DOCTYPE html>
<html lang="en-us">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>DOMESTIC FEARS</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: #231F20;
}

#unity-container {
  width: 100%;
  height: 100%;
  position: fixed;
  top: 0;
  left: 0;
}

#loading-text {
  color: white;
  font-size: 40px;
  text-align: center;
  margin-top: 20px;
}
</style>
</head>

<body>

<div id="loading-text">LOADING... 0 MB / 53.3 MB</div>

<div hidden id="unity-container">
  <canvas id="unity-canvas"></canvas>

  <div id="unity-loading-bar">
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>
</div>

<script>
// ===== IndexedDB Cache (same as your example) =====
const DB_NAME = "cachedb";
const STORE_NAME = "files";

function openCacheDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);

    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };

    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveToCache(key, blob) {
  const db = await openCacheDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).put(blob, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function loadFromCache(key) {
  const db = await openCacheDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const req = tx.objectStore(STORE_NAME).get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}

async function deleteFromCache(key) {
  const db = await openCacheDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
</script>

<script>
// ===== Progress Tracking =====
let loadedBytes = 0;
const totalMB = 53.3;
const loadingText = document.getElementById("loading-text");

function updateProgress(bytes) {
  loadedBytes += bytes;
  let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
  loadingText.textContent = `LOADING... ${mbDone} MB / ${totalMB} MB`;
}

// ===== Fetch with streaming progress =====
async function fetchWithProgress(url) {
  const response = await fetch(url);
  const reader = response.body.getReader();

  let chunks = [];
  let received = 0;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    chunks.push(value);
    received += value.length;
    updateProgress(value.length);
  }

  let fullBuffer = new Uint8Array(received);
  let offset = 0;

  for (let chunk of chunks) {
    fullBuffer.set(chunk, offset);
    offset += chunk.length;
  }

  return fullBuffer.buffer;
}

// ===== Merge system (same logic as your example) =====
async function mergeFiles(fileParts, cacheKey) {
  const cached = await loadFromCache(cacheKey);
  if (cached) {
    return URL.createObjectURL(cached);
  }

  const buffers = await Promise.all(
    fileParts.map(part => fetchWithProgress(part))
  );

  const mergedBlob = new Blob(buffers);
  await saveToCache(cacheKey, mergedBlob);

  return URL.createObjectURL(mergedBlob);
}

// ===== Helper for parts =====
function getParts(file, start, end) {
  let parts = [];
  for (let i = start; i <= end; i++) {
    parts.push(file + ".part" + i);
  }
  return parts;
}

// ===== MAIN =====
(async () => {

  // Only 2 parts for data, 1 wasm
  const [dataUrl, wasmUrl] = await Promise.all([
    mergeFiles(getParts("Build/Domestic-Fears.data", 1, 2), "df.data"),
    fetchWithProgress("Build/Domestic-Fears.wasm").then(buf => URL.createObjectURL(new Blob([buf])))
  ]);

  var buildUrl = "./Build";
  var loaderUrl = buildUrl + "/Domestic-Fears.loader.js";

  var config = {
    dataUrl: dataUrl,
    frameworkUrl: buildUrl + "/Domestic-Fears.framework.js",
    codeUrl: wasmUrl,
    streamingAssetsUrl: "StreamingAssets",
    companyName: "RosenShine Games",
    productName: "DOMESTIC FEARS",
    productVersion: "1.0",
  };

  var container = document.querySelector("#unity-container");
  container.hidden = false;

  var canvas = document.querySelector("#unity-canvas");
  var loadingBar = document.querySelector("#unity-loading-bar");
  var progressBarFull = document.querySelector("#unity-progress-bar-full");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  loadingBar.style.display = "block";

  var script = document.createElement("script");
  script.src = loaderUrl;

  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      progressBarFull.style.width = (progress * 100) + "%";
    }).then(() => {
      loadingText.remove();
      loadingBar.style.display = "none";
      canvas.style.display = "block";
    }).catch(async (err) => {
      await deleteFromCache("df.data");
      console.error(err);
    });
  };

  document.body.appendChild(script);

})();
</script>

</body>
</html>
