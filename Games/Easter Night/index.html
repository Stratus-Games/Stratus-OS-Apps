<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Unity WebGL Player | Easter Night</title>

<link rel="shortcut icon" href="TemplateData/favicon.ico">
<link rel="stylesheet" href="TemplateData/style.css">

<style>
#loading-text {
  color: white;
  font-size: 36px;
  text-align: center;
  margin-top: 20px;
}
</style>
<style>
#loading-text {
  color: rgb(0, 0, 0);
  font-size: 42px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  font-weight: 600;
  letter-spacing: 2px;
  text-align: center;
  margin-top: 20px;
}
</style>
</head>

<body>

<div id="loading-text">LOADING... 0 MB / 48.1 MB</div>

<div id="unity-container">
  <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>

  <div id="unity-loading-bar">
    <div id="unity-logo"></div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>

  <div id="unity-warning"></div>
</div>

<script>
// ===== IndexedDB =====
const DB_NAME = "cachedb";
const STORE_NAME = "files";

function openCacheDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveToCache(key, blob) {
  const db = await openCacheDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).put(blob, key);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function loadFromCache(key) {
  const db = await openCacheDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const req = tx.objectStore(STORE_NAME).get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}

async function deleteFromCache(key) {
  const db = await openCacheDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).delete(key);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}
</script>

<script>
// ===== Progress =====
let loadedBytes = 0;
const totalMB = 48.1;
const loadingText = document.getElementById("loading-text");

function updateProgress(bytes) {
  loadedBytes += bytes;
  let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
  loadingText.textContent = `LOADING... ${mbDone} MB / ${totalMB} MB`;
}

// ===== Fetch =====
async function fetchWithProgress(url) {
  const response = await fetch(url);
  const reader = response.body.getReader();

  let chunks = [];
  let received = 0;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    chunks.push(value);
    received += value.length;
    updateProgress(value.length);
  }

  let fullBuffer = new Uint8Array(received);
  let offset = 0;

  for (let chunk of chunks) {
    fullBuffer.set(chunk, offset);
    offset += chunk.length;
  }

  return fullBuffer.buffer;
}

// ===== Merge =====
async function mergeFiles(fileParts, cacheKey) {
  const cached = await loadFromCache(cacheKey);
  if (cached) {
    return URL.createObjectURL(cached);
  }

  const buffers = await Promise.all(
    fileParts.map(part => fetchWithProgress(part))
  );

  const mergedBlob = new Blob(buffers);
  await saveToCache(cacheKey, mergedBlob);

  return URL.createObjectURL(mergedBlob);
}

// ===== Parts helper =====
function getParts(file, start, end) {
  let parts = [];
  for (let i = start; i <= end; i++) {
    parts.push(file + ".part" + i);
  }
  return parts;
}
</script>

<script>
window.addEventListener("load", function () {
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("ServiceWorker.js");
  }
});

var container = document.querySelector("#unity-container");
var canvas = document.querySelector("#unity-canvas");
var loadingBar = document.querySelector("#unity-loading-bar");
var progressBarFull = document.querySelector("#unity-progress-bar-full");
var warningBanner = document.querySelector("#unity-warning");

function unityShowBanner(msg, type) {
  var div = document.createElement('div');
  div.innerHTML = msg;
  warningBanner.appendChild(div);
  if (type == 'error') div.style = 'background:red;padding:10px;';
}

// ===== MAIN =====
(async () => {

  const buildUrl = "Build";
  const loaderUrl = buildUrl + "/Easter-Night.loader.js";

  // ONLY wasm is split
  const wasmUrl = await mergeFiles(
    getParts(buildUrl + "/Easter-Night.wasm", 1, 2),
    "en.wasm"
  );

  const config = {
    dataUrl: buildUrl + "/Easter-Night.data",
    frameworkUrl: buildUrl + "/Easter-Night.framework.js",
    codeUrl: wasmUrl,
    streamingAssetsUrl: "StreamingAssets",
    companyName: "Stratus Games",
    productName: "Easter Night",
    productVersion: "0.1",
    showBanner: unityShowBanner,
  };

  loadingBar.style.display = "block";

  const script = document.createElement("script");
  script.src = loaderUrl;

  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      progressBarFull.style.width = (progress * 100) + "%";
    }).then(() => {
      loadingText.remove();
      loadingBar.style.display = "none";
    }).catch(async (err) => {
      await deleteFromCache("en.wasm");
      alert(err);
    });
  };

  document.body.appendChild(script);

})();
</script>

</body>
</html>
