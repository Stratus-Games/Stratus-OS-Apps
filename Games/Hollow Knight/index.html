<!DOCTYPE html>
<html lang="en-us">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hollow Knight</title>

<link rel="manifest" href="manifest.json">
<link rel="shortcut icon" href="TemplateData/favicon.ico">
<link rel="stylesheet" href="TemplateData/style.css">

<!-- Preload -->
<link rel="preload" href="Build/hktruffled.loader.js" as="script">
<link rel="preload" href="Build/hktruffled.framework.js" as="script">
<link rel="preload" href="Build/hktruffled.data" as="fetch" crossorigin>
<link rel="preload" href="Build/hktruffled.wasm" as="fetch" type="application/wasm" crossorigin>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #231F20;
}

#unity-container {
    width: 100%;
    height: 100%;
    position: fixed;
    top: 0;
    left: 0;
}

#loading-text {
    color: white;
    font-size: 48px;
    font-family: cursive;
    text-align: center;
    margin-top: 20px;
}
</style>
</head>

<body>

<div id="loading-text">LOADING...</div>

<div hidden id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas"></canvas>

    <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
        </div>
    </div>
</div>

<script>
var loadingText = document.querySelector("#loading-text");
let loadedBytes = 0;

// Progress fetch
async function fetchWithProgress(url) {
    const response = await fetch(url);
    const reader = response.body.getReader();

    let chunks = [];
    let received = 0;

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        received += value.length;
        loadedBytes += value.length;
        chunks.push(value);

        let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
        loadingText.textContent = `LOADING... ${mbDone} MB`;
    }

    let fullBuffer = new Uint8Array(received);
    let offset = 0;

    for (let chunk of chunks) {
        fullBuffer.set(chunk, offset);
        offset += chunk.length;
    }

    return fullBuffer.buffer;
}

// Merge parts
async function mergeFiles(fileParts) {
    const buffers = await Promise.all(
        fileParts.map(part => fetchWithProgress(part))
    );
    return URL.createObjectURL(new Blob(buffers));
}

function getParts(file, start, end) {
    let parts = [];
    for (let i = start; i <= end; i++) {
        parts.push(file + ".part" + i);
    }
    return parts;
}

(async () => {

    const [dataUrl, wasmurl] = await Promise.all([
        mergeFiles(getParts("Build/hktruffled.data", 1, 45)),
        mergeFiles(getParts("Build/hktruffled.wasm", 1, 2)),
    ]);

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/hktruffled.loader.js";

    var config = {
        dataUrl: dataUrl,
        frameworkUrl: buildUrl + "/hktruffled.framework.js",
        codeUrl: wasmurl,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Team Cherry & Truffled",
        productName: "Hollow Knight",
        productVersion: "1.1",
    };

    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");

    // ─────────────────────────────────────
    // FIXED DEVICE DETECTION (NO UA BLOCK)
    // ─────────────────────────────────────
    const isTouchDevice =
        ('ontouchstart' in window && navigator.maxTouchPoints > 1);

    const hasWebGL2 = (() => {
        try {
            const c = document.createElement("canvas");
            return !!window.WebGL2RenderingContext &&
                   !!c.getContext("webgl2");
        } catch {
            return false;
        }
    })();

    // Always treat as desktop unless WebGL is missing
    const isMobileBlock = isTouchDevice && !hasWebGL2;

    if (!isMobileBlock) {
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
    }

    container.hidden = false;
    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = (100 * progress) + "%";
        }).then(() => {
            loadingText.remove();
            loadingBar.style.display = "none";
            canvas.style.display = "block";
        }).catch((message) => {
            alert(message);
        });
    };

    document.body.appendChild(script);

})();
</script>

</body>
</html>
