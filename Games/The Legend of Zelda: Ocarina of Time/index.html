<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hypper Drive 2 | The Legend of Zelda: Ocarina of Time</title>
<base href="./">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: monospace;
  font-weight: bold;
  background: #000;
  color: #fff;
  overflow: hidden;
}

#error {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  color: #f33;
  font-size: 16px;
  z-index: 1000;
}

#game {
  position: absolute;
  inset: 0;
  background: #000;
}

/* Loading Overlay */
#loadingOverlay {
  position: absolute;
  inset: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 999;
}

#loadingContainer {
  position: relative;
  width: 260px;
  height: 260px;
}

#loadingContainer img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

#progressCircle {
  position: absolute;
  inset: 0;
  transform: rotate(-90deg);
  pointer-events: none;
}

#progressCircle circle {
  fill: none;
  stroke-width: 12;
  stroke-linecap: round;
}

#progressBackground {
  stroke: rgba(255,255,255,0.06);
}

#progressForeground {
  stroke: red;
  stroke-dasharray: 565.48;
  stroke-dashoffset: 565.48;
  transition: stroke-dashoffset 0.15s linear;
}

#loadingText {
  margin-top: 18px;
  font-size: 16px;
}
</style>
</head>
<body>

<div id="error"></div>
<div id="game"></div>

<!-- Loading Overlay -->
<div id="loadingOverlay">
  <div id="loadingContainer">
    <img src="./icon.png">
    <svg id="progressCircle" viewBox="0 0 200 200">
      <circle id="progressBackground" cx="100" cy="100" r="90"></circle>
      <circle id="progressForeground" cx="100" cy="100" r="90"></circle>
    </svg>
  </div>
  <div id="loadingText">Loading Ocarina of Time…</div>
</div>

<script>
const partUrls = [
  "./Legend of Zelda-Ocarina of Time.part.001",
  "./Legend of Zelda-Ocarina of Time.part.002"
];

const error = document.getElementById("error");
const loadingOverlay = document.getElementById("loadingOverlay");
const progressForeground = document.getElementById("progressForeground");

(async () => {
  try {
    let received = 0;
    let total = 0;
    const parts = [];

    /* Get sizes for accurate progress */
    for (const url of partUrls) {
      const head = await fetch(url, { method: "HEAD" });
      total += Number(head.headers.get("content-length")) || 0;
    }

    for (let i = 0; i < partUrls.length; i++) {
      const res = await fetch(partUrls[i]);
      if (!res.ok) throw new Error(`Failed to fetch part ${i + 1}`);

      const reader = res.body.getReader();
      const chunks = [];

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        chunks.push(value);
        received += value.length;

        if (total) {
          const pct = Math.min(1, received / total);
          progressForeground.style.strokeDashoffset =
            565.48 * (1 - pct);
        }
      }

      const size = chunks.reduce((s, c) => s + c.length, 0);
      const mergedPart = new Uint8Array(size);
      let offset = 0;
      for (const c of chunks) {
        mergedPart.set(c, offset);
        offset += c.length;
      }

      parts.push(mergedPart);
    }

    const finalSize = parts.reduce((s, p) => s + p.length, 0);
    const merged = new Uint8Array(finalSize);
    let offset = 0;
    for (const p of parts) {
      merged.set(p, offset);
      offset += p.length;
    }

    const blobUrl = URL.createObjectURL(new Blob([merged]));

    window.EJS_player = "#game";
    window.EJS_gameName = "Hypper Drive 2 | The Legend of Zelda: Ocarina of Time";
    window.EJS_gameUrl = blobUrl;
    window.EJS_core = "n64";
    window.EJS_pathtodata = "data/";
    window.EJS_startOnLoaded = true;

    const script = document.createElement("script");
    script.src = "data/loader.js";

    script.onload = () => {
      loadingOverlay.style.opacity = "0";
      loadingOverlay.style.transition = "opacity 300ms";
      setTimeout(() => loadingOverlay.remove(), 350);
    };

    script.onerror = () => {
      error.textContent = "Failed to load EmulatorJS core";
      loadingOverlay.remove();
    };

    document.body.appendChild(script);

  } catch (e) {
    error.textContent = "Error: " + e.message;
    loadingOverlay.remove();
    console.error(e);
  }
})();
</script>

</body>
</html>
