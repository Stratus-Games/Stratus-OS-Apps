<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hypper Drive 2 | The Legend of Zelda: Oracle of Ages</title>

<base href="./">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
  height: 100%;
  margin: 0;
  background: #000;
  font-family: monospace;
  font-weight: bold;
  overflow: hidden;
  color: #fff;
}

#error {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  color: #f33;
  z-index: 1000;
}

#game {
  position: absolute;
  inset: 0;
  background: #000;
}

/* ===== Loader ===== */
#loading {
  position: absolute;
  inset: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 999;
}

#logoWrap {
  position: relative;
  width: 260px;
  height: 260px;
}

#logoWrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

svg {
  position: absolute;
  inset: 0;
  transform: rotate(-90deg);
}

circle {
  fill: none;
  stroke-width: 12;
  stroke-linecap: round;
}

#bg {
  stroke: rgba(255,255,255,0.08);
}

#fg {
  stroke: red;
  stroke-dasharray: 565.48;
  stroke-dashoffset: 565.48;
  transition: stroke-dashoffset 0.12s linear;
}

#text {
  margin-top: 18px;
  font-size: 15px;
}
</style>
</head>

<body>

<div id="error"></div>
<div id="game"></div>

<div id="loading">
  <div id="logoWrap">
    <img src="icon.png">
    <svg viewBox="0 0 200 200">
      <circle id="bg" cx="100" cy="100" r="90"></circle>
      <circle id="fg" cx="100" cy="100" r="90"></circle>
    </svg>
  </div>
  <div id="text">Loading The Legend of Zelda: Oracle of Ages…</div>
</div>

<script>
const romUrl = "loz-ooa.gbc";

const fg = document.getElementById("fg");
const loading = document.getElementById("loading");
const error = document.getElementById("error");

(async () => {
  try {
    const res = await fetch(romUrl);
    if (!res.ok) throw new Error("Failed to fetch ROM: " + res.status + " " + res.statusText);
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);

    window.EJS_player = "#game";
    window.EJS_gameName = "The Legend of Zelda: Oracle of Ages";
    window.EJS_gameUrl = blobUrl;
    window.EJS_core = "gb";
    window.EJS_pathtodata = "data/";
    window.EJS_startOnLoaded = true;

    const s = document.createElement("script");
    s.src = "data/loader.js";
    s.onload = () => {
      loading.style.opacity = "0";
      loading.style.transition = "opacity 300ms";
      setTimeout(() => loading.remove(), 350);
    };
    s.onerror = () => error.textContent = "Failed to load EmulatorJS core";
    document.body.appendChild(s);

  } catch (e) {
    error.textContent = "Error: " + e.message;
    loading.remove();
    console.error(e);
  }
})();
</script>

</body>
</html>
